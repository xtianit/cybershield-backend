services:
  - type: web
    name: cybershield-backend
    env: node  # Changed from 'runtime' to 'env'
    buildCommand: npm install
    startCommand: node --experimental-sqlite server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
