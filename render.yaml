services:
  - type: web
    name: cybershield-backend
    runtime: node  # This is the correct property for specifying Node.js
    buildCommand: npm install
    startCommand: node --experimental-sqlite server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
